<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çok Yakında | Yapım Aşamasında</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #121212;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        .logo {
            font-size: 50px;
            margin-bottom: 20px;
            color: #00d2ff;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #bbb;
            margin-bottom: 30px;
        }

        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00d2ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .social-links a {
            color: white;
            font-size: 24px;
            margin: 0 15px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: #00d2ff;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <i class="fas fa-tools"></i>
        </div>
        <h1>gunesgruptemizlik.com</h1>
        <h1>Çok Yakında</h1>
        <p>Web sitemiz şu an yenileniyor. Size daha iyi bir deneyim sunmak için arka planda harıl harıl çalışıyoruz.</p>
        
        <div class="loader"></div>

        <div class="social-links">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="mailto:info@domain.com"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="footer">
            &copy; 2026 Tüm Hakları Saklıdır.
        </div>
    </div>

</body>
</html>
